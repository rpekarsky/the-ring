<!DOCTYPE HTML>
<html>
<head>
    <title>The Ring Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <style>
        html,body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .over {
            pointer-events: none;
            z-index: 10;
            position: absolute;
            top: 5px;
            opacity: 0.9;
            display: inline-block;
            font-family: monospace;
            font-weight: bold;
            width: auto;
            color: white;
            font-size: 16px;
        }

        .level{
            display: none;
            left: 5px;
            top: 5px;
        }

        .score{
            display: none;
            left: 5px;
            top: 30px;
            font-size: 30px;
        }

        .highscore{
            display: none;
            right: 5px;
            top: 5px;
        }

        .multipler{
            display: none;
            left: 5px;
            top: 70px;
            font-size: 40px;
        }
    </style>
</head>
<body>
    <script src="out/out.js"></script>
</body>
</html>
