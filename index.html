<!DOCTYPE HTML>
<html>
<head>
    <title>The Ring</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="icon" type="image/png" href="icon_gear3.png">
    <style>
        html,body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .utility {
            position: fixed;
            bottom: 8px;
            right: 12px;
            z-index: 100;
            font-family: monospace;
            font-size: 11px;
        }
        .utility a {
            color: #555;
            margin-left: 14px;
            text-decoration: none;
            border-bottom: 1px dotted #444;
        }
        .utility a:hover { color: #aaa; border-bottom-color: #888; }
        .over {
            pointer-events: none;
            z-index: 10;
            position: absolute;
            top: 5px;
            opacity: 0.9;
            display: inline-block;
            font-family: monospace;
            font-weight: bold;
            width: auto;
            color: white;
            font-size: 16px;
        }

        .level{
            display: none;
            left: 5px;
            top: 5px;
        }

        .score{
            display: none;
            left: 5px;
            top: 30px;
            font-size: 30px;
        }

        .highscore{
            display: none;
            right: 5px;
            top: 5px;
        }

        .multipler{
            display: none;
            left: 5px;
            top: 70px;
            font-size: 40px;
        }
    </style>
</head>
<body>
    <div class="utility">
        <a href="#" onclick="resetProgress(); return false;">reset progress</a>
        <a href="#" onclick="unlockAll(); return false;">unlock all modes</a>
    </div>
    <script>
    function resetProgress(){
        if(!confirm('Reset all progress and high scores?')) return;
        ['scores','last_game','koan_unlocked','mondo_unlocked','dharma_unlocked'].forEach(function(k){
            localStorage.removeItem(k);
        });
        location.reload();
    }
    function unlockAll(){
        ['koan_unlocked','mondo_unlocked','dharma_unlocked'].forEach(function(k){
            localStorage.setItem(k,'true');
        });
        location.reload();
    }
    </script>

    <!-- LIBS -->
    <script src="lib/stats.min.js"></script>
    <script src="lib/signals.js"></script>
    <script src="lib/victor.min.js"></script>
    <script src="lib/pixi.js"></script>
    <script src="lib/buzz.min.js"></script>
    <script src="lib/TweenLite.js"></script>
    <script src="lib/EasePack.min.js"></script>
    <script src="lib/mousetrap.js"></script>
    
    <!-- CODE -->
    <script src="js/signals-init.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/Storage.js"></script>
    <script src="js/Score.js"></script>
    <script src="js/CustomPixiShader.js"></script>
    <script src="js/BlendShader.js"></script>
    <script src="js/Strip.js"></script>
    <script src="js/Quad.js"></script>
    <script src="js/Deadline.js"></script>
    <script src="js/Background.js"></script>

    <script src="js/MenuIcons.js"></script>
    <script src="js/LevelBlocked.js"></script>
    <script src="js/ScoreLine.js"></script>
    <script src="js/Settings.js"></script>
    <script src="js/MainMenu.js"></script>
    <script src="js/TitleScreen.js"></script>
    <script src="js/States.js"></script>

    <!-- EFFECTS -->
    <script src="js/NewLevelEffect.js"></script>
    <script src="js/FlareEffect.js"></script>

    <!-- GAME TYPES -->
    <script src="js/Game.js"></script>
    <script src="js/Zen.js"></script>
    <script src="js/Koan.js"></script>
    <script src="js/Mondo.js"></script>
    <script src="js/Dharma.js"></script>

    <script src="js/BlockBorders.js"></script>
    <script src="js/Blocks.js"></script>
    <script src="js/Block.js"></script>
    <script src="js/Score.js"></script>
    <script src="js/NewBlocks.js"></script>
    <script src="js/init.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/Vibrate.js"></script>
    <script src="js/TouchInput.js"></script>
</body>
</html>
