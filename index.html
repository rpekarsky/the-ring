<!DOCTYPE HTML>
<html>
<head>
    <title>The Ring</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="icon" type="image/png" href="icon_gear3.png">
    <style>
        html,body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .utility {
            position: fixed;
            bottom: 8px;
            right: 12px;
            z-index: 100;
            font-family: monospace;
            font-size: 11px;
        }
        .utility a {
            color: #555;
            margin-left: 14px;
            text-decoration: none;
            border-bottom: 1px dotted #444;
        }
        .utility a:hover { color: #aaa; border-bottom-color: #888; }
        .over {
            pointer-events: none;
            z-index: 10;
            position: absolute;
            top: 5px;
            opacity: 0.9;
            display: inline-block;
            font-family: monospace;
            font-weight: bold;
            width: auto;
            color: white;
            font-size: 16px;
        }

        .level{
            display: none;
            left: 5px;
            top: 5px;
        }

        .score{
            display: none;
            left: 5px;
            top: 30px;
            font-size: 30px;
        }

        .highscore{
            display: none;
            right: 5px;
            top: 5px;
        }

        .multipler{
            display: none;
            left: 5px;
            top: 70px;
            font-size: 40px;
        }
    </style>
</head>
<body>
    <div class="utility">
        <a href="#" onclick="resetProgress(); return false;">reset progress</a>
        <a href="#" onclick="unlockAll(); return false;">unlock all modes</a>
        <a href="https://github.com/rpekarsky/the-ring" target="_blank" rel="noopener" title="source on GitHub" aria-label="source on GitHub">

            source
        </a>
    </div>
    <script>
    function resetProgress(){
        if(!confirm('Reset all progress and high scores?')) return;
        ['scores','last_game','koan_unlocked','mondo_unlocked','dharma_unlocked'].forEach(function(k){
            localStorage.removeItem(k);
        });
        location.reload();
    }
    function unlockAll(){
        ['koan_unlocked','mondo_unlocked','dharma_unlocked'].forEach(function(k){
            localStorage.setItem(k,'true');
        });
        location.reload();
    }
    </script>
