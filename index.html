<!DOCTYPE HTML>
<html>
<head>
    <title>The Ring Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <style>
        html,body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            position: relative;
        }
        canvas {
            display: block;
            margin: 0;
        }
        .over {
            pointer-events: none;
            z-index: 10;
            position: absolute;
            top: 5px;
            opacity: 0.9;
            display: inline-block;
            font-family: monospace;
            font-weight: bold;
            width: auto;
            color: white;
            font-size: 16px;
        }

        .level{
            display: none;
            left: 5px;
            top: 5px;
        }

        .score{
            display: none;
            left: 5px;
            top: 30px;
            font-size: 30px;
        }

        .highscore{
            display: none;
            right: 5px;
            top: 5px;
        }

        .multipler{
            display: none;
            left: 5px;
            top: 70px;
            font-size: 40px;
        }
    </style>
</head>
<body>
    <!-- LIBS -->
    <script src="stats.min.js"></script>
    <script src="signals.js"></script>
    <script src="signals-init.js"></script>
    <script src="victor.js"></script>
    <script src="pixi.js"></script>
    <script src="mousetrap.js"></script>
    <script src="howler.min.js"></script>
    <script src="buzz.min.js"></script>
    
    <!-- CODE -->
    <script src="utils.js"></script>
    <script src="Storage.js"></script>
    <script src="Score.js"></script>
    <script src="CustomPixiShader.js"></script>
    <script src="BlendShader.js"></script>
    <script src="Strip.js"></script>
    <script src="Quad.js"></script>
    <script src="TweenLite.js"></script>
    <script src="EasePack.min.js"></script>
    <script src="Deadline.js"></script>
    <script src="Background.js"></script>

    <script src="MenuIcons.js"></script>
    <script src="LevelBlocked.js"></script>
    <script src="ScoreLine.js"></script>
    <script src="Settings.js"></script>
    <script src="MainMenu.js"></script>
    <script src="TitleScreen.js"></script>
    <script src="States.js"></script>

    <!-- EFFECTS -->
    <script src="NewLevelEffect.js"></script>
    <script src="FlareEffect.js"></script>

    <!-- GAME TYPES -->
    <script src="Game.js"></script>
    <script src="Zen.js"></script>
    <script src="Koan.js"></script>
    <script src="Mondo_new.js"></script>
    <script src="Dharma.js"></script>

    <script src="BlockBorders.js"></script>
    <script src="Blocks.js"></script>
    <script src="Block.js"></script>
    <script src="Score.js"></script>
    <script src="NewBlocks.js"></script>
    <script src="init.js"></script>
    <script src="sounds.js"></script>
    <script src="Vibrate.js"></script>
    <script src="TouchInput.js"></script>
</body>
</html>
